name: Install Runner Dependencies

# Reusable workflow to install Docker and other dependencies on self-hosted runners.
# Called by deploy workflows only when Docker is not available.

on:
  workflow_call:
    inputs:
      runner_label:
        description: "Runner label to install dependencies on"
        required: true
        type: string

  workflow_dispatch:
    inputs:
      runner_label:
        type: choice
        description: "Runner to install dependencies on"
        required: true
        default: "int"
        options:
          - int
          - test

jobs:
  install-docker:
    name: Install Docker on ${{ inputs.runner_label }}
    runs-on: [self-hosted, "${{ inputs.runner_label }}"]

    steps:
      - name: Check if Docker is installed
        id: check-docker
        run: |
          if command -v docker &> /dev/null; then
            echo "Docker is already installed: $(docker --version)"
            echo "installed=true" >> $GITHUB_OUTPUT
          else
            echo "Docker is NOT installed"
            echo "installed=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Check if Docker Compose plugin is available
        id: check-compose
        if: steps.check-docker.outputs.installed == 'true'
        run: |
          if docker compose version &> /dev/null; then
            echo "Docker Compose is available: $(docker compose version)"
            echo "installed=true" >> $GITHUB_OUTPUT
          else
            echo "Docker Compose is NOT available"
            echo "installed=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Checkout code
        if: steps.check-docker.outputs.installed == 'false' || steps.check-compose.outputs.installed == 'false'
        uses: actions/checkout@v4
        with:
          sparse-checkout: devops/ansible

      - name: Install Ansible
        if: steps.check-docker.outputs.installed == 'false' || steps.check-compose.outputs.installed == 'false'
        run: |
          if ! command -v ansible &> /dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq ansible
          fi
        shell: bash

      - name: Run Ansible playbook to install Docker
        if: steps.check-docker.outputs.installed == 'false' || steps.check-compose.outputs.installed == 'false'
        run: |
          ansible-playbook devops/ansible/playbook_install_docker.yml \
            --connection=local \
            --inventory "127.0.0.1," \
            --extra-vars "ansible_user=$(whoami)"
        shell: bash

      - name: Verify Docker is working
        run: |
          docker --version
          docker compose version
          echo "Docker is ready on ${{ inputs.runner_label }} runner"
        shell: bash
