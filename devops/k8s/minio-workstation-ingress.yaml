# MinIO S3 API on the workstation.co.uk apex (k3s1).
#
# Why this exists
# ---------------
# The nightly DB backup (.github/workflows/db_backup.yml) uploads dumps with
# `mc`, which VERIFIES TLS. Its endpoint resolved to the WSL Proxy edge but had
# no SSL-enabled vhost registered there, so the edge served its placeholder
# "sni-support-required-for-valid-ssl" certificate and every upload failed:
#
#   mc: Unable to initialize new alias ... tls: failed to verify certificate:
#   x509: certificate is not valid for any names
#
# The pre-existing *-minio.diytaxreturn.co.uk Ingresses have the same broken
# cert AND point at :9001 (the MinIO *console*), not :9000 (the S3 API that
# `mc` needs). So this adds a proper S3-API path on the workstation.co.uk apex.
#
# Traffic path (identical to opsapi):
#   <env>-minio.workstation.co.uk
#     -> Cloudflare (*.workstation.co.uk wildcard already CNAMEs to the edge)
#     -> pop0.wslproxy.com   (vhost has ssl_enabled + ssl_auto_renew => real LE cert)
#     -> 13.42.188.136:80    (k3s1 traefik, wslproxy ingress class)
#     -> this Ingress        -> diytaxreturn-minio:9000
#
# The matching edge vhosts live in .github/wslproxy/data/{rules,servers}/prod/
# (rule: minio-prod-default) and are pushed by wslproxy-register-domains.yml.
#
# OWNERSHIP CAVEAT: the diytaxreturn-minio Deployment/Service is owned by the
# sibling diy-tax-return-uk chart, not this repo. These Ingresses were applied
# with `kubectl apply` and are committed here so the change is reviewable and
# reproducible; they should be folded into that chart when convenient. They are
# deliberately SEPARATE resources (name: minio-workstation) so the existing
# console Ingress is left untouched.
#
# Apply with:
#   kubectl apply -f devops/k8s/minio-workstation-ingress.yaml
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-workstation
  namespace: int
  labels:
    app: diytaxreturn-minio
    managed-by: opsapi-workstation-migration
spec:
  ingressClassName: wslproxy
  rules:
    - host: int-minio.workstation.co.uk
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: diytaxreturn-minio
                port:
                  number: 9000
---
