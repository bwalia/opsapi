env: int
app: diytaxreturn-lapis
# Scope migrations + namespace setup to the tax app only. With "all",
# this deployment would run (and own) migrations for every platform
# project — ecommerce, hospital, crm, kanban, … — none of which the
# DIY Tax Return app uses. A CRM migration drift took acc opsapi down
# for 22h on 2026-05-14; "tax_copilot" makes that class of failure
# impossible since non-tax migration modules are never loaded.
projectCode: tax_copilot

# ─── Password reset email link target ─────────────────────────────────
# Canonical frontend origin for this environment. Migration 489 uses
# this to bootstrap ``namespaces.allowed_redirect_origins`` on first
# run; runtime path also falls back to it if any namespace's column
# is empty. See README.md → Password Reset Flow.
frontendUrl: "https://int.diytaxreturn.co.uk"
# passwordResetAllowedOrigins: ""

image:
  repository: bwalia/opsapi
  tag: latest
  pullPolicy: Always

replicaCount: 1

service:
  type: ClusterIP
  port: 80

# INTENTIONALLY DISABLED — do not flip to `true` without reading this.
#
# `int-api.diytaxreturn.co.uk` is already owned by the `diytaxreturn-fastapi`
# Helm chart (in the sibling diy-tax-return-uk repo). That chart's Ingress
# does path-based routing on this host: `/fastapi/*` → fastapi service,
# `/` `/auth` `/opsapi` → THIS chart's lapis Service.
#
# Enabling the block below creates a SECOND Ingress claiming the same host,
# which puts the wslproxy ingress controller in an ambiguous state: it picks
# one Ingress per request, so traffic flaps between the right backend and
# whatever the other Ingress points at. On 2026-06-15 a stale duplicate in
# the `test` namespace caused exactly this — ~10% of int-api requests
# returned the controller's stock 404 page, the rest worked, and `kubectl
# get pods` reported everything healthy. Took 4 days to track down because
# the failure mode is intermittent.
#
# If you ever need this chart to own the host directly, first delete the
# fastapi chart's Ingress (or migrate its path rules into this chart's
# template) — never run both simultaneously.
ingress:
  enabled: false
  className: wslproxy
  annotations: {}
  hosts: []
  tls: []

database:
  host: "10.96.129.108"

# int runs on k3s and follows the acc/prod path: secrets come from Vault
# via ExternalSecret (dataFrom secret/diytaxreturnuk/opsapi/int/config),
# not a manually-created Kubernetes secret.
externalSecret:
  enabled: true

setup:
  adminEmail: ""
  adminPassword: ""
  namespaceSlug: ""

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
