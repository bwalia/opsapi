env: dev
app: diytaxreturn-lapis
# Scope migrations + namespace setup to the tax app only. With "all",
# this deployment would run (and own) migrations for every platform
# project — ecommerce, hospital, crm, kanban, … — none of which the
# DIY Tax Return app uses. A CRM migration drift took acc opsapi down
# for 22h on 2026-05-14; "tax_copilot" makes that class of failure
# impossible since non-tax migration modules are never loaded.
projectCode: tax_copilot

# ─── Password reset email link target ─────────────────────────────────
# Canonical frontend origin for the dev cluster. Migration 489 uses
# this to bootstrap ``namespaces.allowed_redirect_origins``. Update
# to your dev frontend URL if you have one; leaving empty is safe —
# the auth.lua localhost dev fallback will fire and a WARN gets
# logged. See README.md → Password Reset Flow.
frontendUrl: "https://dev.diytaxreturn.co.uk"
# passwordResetAllowedOrigins: ""

image:
  repository: bwalia/opsapi
  tag: latest
  pullPolicy: Always

replicaCount: 1

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: wslproxy
  annotations: {}
  hosts: []
  tls: []

externalSecret:
  enabled: false

setup:
  adminEmail: ""
  adminPassword: ""
  namespaceSlug: ""

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
