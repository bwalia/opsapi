# Source: opsapi/templates/cronjob.yaml
apiVersion: batch/v1
kind: CronJob
metadata:
  name:  {{ .Values.app }}-{{ .Release.Namespace }}-db-backup-hourly
spec:
  schedule: "0 * * * *"
  #testing 1 min "0 */1 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: "opsapi-db-backup-{{ .Release.Namespace }}-hourly"
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["/bin/sh", "-c"]
              args:
                - |
                  echo "Connecting to PostgreSQL at: $POSTGRES_HOST"

                  # Load environment variables
                  export PGPASSWORD="$POSTGRES_PASSWORD"

                  # Check if we can reach the PostgreSQL server
                  pg_isready -h "$POSTGRES_HOST" -p $POSTGRES_PORT -U "$POSTGRES_USER"

                  # Set backup file name with timestamp
                  BACKUP_FILE="/tmp/backup_$(date +'%Y-%m-%d_%H-%M-%S').sql.gz"

                  echo "Starting PostgreSQL backup..."

                  # ✅ Force TCP connection by explicitly setting -h and -p
                  pg_dump -h "$POSTGRES_HOST" -p $POSTGRES_PORT -U "$POSTGRES_USER" -d "$POSTGRES_DB" | gzip > "$BACKUP_FILE"

                  echo "Backup completed: $BACKUP_FILE"
                  if [ ! -f "$BACKUP_FILE" ]; then
                    echo "Error: Backup file was not created!"
                    exit 1
                  fi
                  # Install MinIO Client
                  curl -O https://dl.min.io/client/mc/release/linux-amd64/mc
                  chmod +x mc && mv mc /usr/local/bin/

                  # Debugging: Ensure MinIO variables are set
                  echo "MinIO Endpoint: $MINIO_ENDPOINT"
                  echo "MinIO Bucket: $MINIO_BUCKET"

                  if [[ -z "$MINIO_ENDPOINT" || -z "$MINIO_BUCKET" ]]; then
                      echo "Error: MINIO_ENDPOINT or MINIO_BUCKET is not set"
                      exit 1
                  fi

                  # ✅ Set MinIO alias
                  mc alias set myminio "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"

                  # ✅ Debug: Check if file exists before copying
                  ls -lh "$BACKUP_FILE"

                  # ✅ Upload to MinIO
                  echo "Uploading backup to MinIO..."
                  mc cp "$BACKUP_FILE" myminio/"opsapi-test-pg"/ || { echo "MinIO upload failed!"; exit 1; }

                  echo "Backup successfully uploaded to MinIO."
              volumeMounts:
                - name: {{ .Release.Name }}-backup-script
                  mountPath: /scripts
                  readOnly: true
                - name: {{ .Release.Name }}-backup-storage
                  mountPath: /backup

              env:
                - name: MINIO_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-secrets
                      key: MINIO_ENDPOINT
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-secrets
                      key: MINIO_ACCESS_KEY
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-secrets
                      key: MINIO_SECRET_KEY
                - name: MINIO_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-secrets
                      key: MINIO_BUCKET
                - name: POSTGRES_HOST
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-secrets
                      key: POSTGRES_HOST
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-secrets
                      key: POSTGRES_USER
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-secrets
                      key: POSTGRES_PASSWORD
                - name: POSTGRES_PORT
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-secrets
                      key: POSTGRES_PORT
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-secrets
                      key: POSTGRES_DB
          volumes:
            - name: {{ .Release.Name }}-backup-script
              configMap:
                name: {{ .Release.Name }}-pg-backup-{{ .Release.Namespace }}
                defaultMode: 0777  # Make it executable
            - name: {{ .Release.Name }}-backup-storage
              emptyDir: {}
      backoffLimit: 0
