{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app: {{ .Release.Name }}
spec:
  # 1m so Vault writes propagate to running pods within a minute. The
  # Stakater Reloader annotation on the Deployment (see deployment.yaml)
  # triggers the rolling restart as soon as ESO updates the Secret's
  # data hash, so end-to-end latency is dominated by this interval.
  # Cost is one extra Vault read per minute per ExternalSecret —
  # negligible against the win of sub-minute secret rotation.
  refreshInterval: "1m"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ .Release.Name }}-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Merge
      data:
        LAPIS_CONFIG_LUA_FILE: |
          -- Read DB / OAuth / secret values from the process ENVIRONMENT
          -- (injected via envFrom this same Secret), NOT from ESO string
          -- templating. This cluster's external-secrets (v1 CRD) does not
          -- substitute `{{`{{ .KEY }}`}}` placeholders in template.data — it
          -- left the baked config.lua with a literal "{{`{{ .POSTGRES_HOST }}`}}"
          -- host, so pgmoon failed with "host or service not provided" and the
          -- pod crash-looped on its postStart migrate. os.getenv keeps config
          -- correct regardless of ESO's templating behaviour, and matches the
          -- image's own /app/config.lua.
          local config = require("lapis.config")
          config("production", {
            port = 80,
            server = "nginx",
            code_cache = "on",
            num_workers = "1",
            session_name = "opsapi_session",
            secret = os.getenv("JWT_SECRET_KEY"),
            postgres = {
              host = {{ if .Values.database.host }}"{{ .Values.database.host }}"{{ else }}os.getenv("POSTGRES_HOST"){{ end }},
              user = os.getenv("POSTGRES_USER"),
              password = os.getenv("POSTGRES_PASSWORD"),
              database = os.getenv("POSTGRES_DB") or "opsapi",
              port = tonumber(os.getenv("POSTGRES_PORT")) or 5432,
              ssl = os.getenv("POSTGRES_SSL") == "true"
            },
            google = {
              client_id = os.getenv("GOOGLE_CLIENT_ID"),
              client_secret = os.getenv("GOOGLE_CLIENT_SECRET"),
              redirect_uri = os.getenv("GOOGLE_REDIRECT_URI")
            }
          })
  dataFrom:
  - extract:
      key: secret/diytaxreturnuk/opsapi/{{ .Values.env }}/config
      # These three fields are DEFAULTED by ESO's admission webhook the
      # moment the resource is applied. Declaring them here so what's in
      # git matches what k8s stores after mutating admission — otherwise
      # ArgoCD reports the ExternalSecret as OutOfSync forever with a
      # cosmetic-only diff, blocking the Application from ever going
      # green. Values MUST match what ESO's webhook writes; the current
      # defaults for external-secrets v0.9+ are `Default`, `None`, `None`.
      # If you ever bump ESO's version and the app starts flapping
      # OutOfSync, check `kubectl explain externalsecret.spec.dataFrom.extract`
      # for what the new defaults are.
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
{{- end }}
