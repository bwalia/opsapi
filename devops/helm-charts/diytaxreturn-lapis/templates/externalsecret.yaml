{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app: {{ .Release.Name }}
spec:
  # 1m so Vault writes propagate to running pods within a minute. The
  # Stakater Reloader annotation on the Deployment (see deployment.yaml)
  # triggers the rolling restart as soon as ESO updates the Secret's
  # data hash, so end-to-end latency is dominated by this interval.
  # Cost is one extra Vault read per minute per ExternalSecret —
  # negligible against the win of sub-minute secret rotation.
  refreshInterval: "1m"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ .Release.Name }}-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Merge
      data:
        LAPIS_CONFIG_LUA_FILE: |
          local config = require("lapis.config")
          config("production", {
            port = 80,
            server = "nginx",
            code_cache = "on",
            num_workers = "1",
            session_name = "opsapi_session",
            secret = "{{`{{ .JWT_SECRET_KEY }}`}}",
            postgres = {
              host = "{{ .Values.database.host | default "{{`{{ .POSTGRES_HOST }}`}}" }}",
              user = "{{`{{ .POSTGRES_USER }}`}}",
              password = "{{`{{ .POSTGRES_PASSWORD }}`}}",
              database = "opsapi",
              port = {{`{{ .POSTGRES_PORT }}`}},
              ssl = true
            },
            google = {
              client_id = "{{`{{ .GOOGLE_CLIENT_ID }}`}}",
              client_secret = "{{`{{ .GOOGLE_CLIENT_SECRET }}`}}",
              redirect_uri = "{{`{{ .GOOGLE_REDIRECT_URI }}`}}"
            }
          })
  dataFrom:
  - extract:
      key: secret/diytaxreturnuk/opsapi/{{ .Values.env }}/config
      # These three fields are DEFAULTED by ESO's admission webhook the
      # moment the resource is applied. Declaring them here so what's in
      # git matches what k8s stores after mutating admission — otherwise
      # ArgoCD reports the ExternalSecret as OutOfSync forever with a
      # cosmetic-only diff, blocking the Application from ever going
      # green. Values MUST match what ESO's webhook writes; the current
      # defaults for external-secrets v0.9+ are `Default`, `None`, `None`.
      # If you ever bump ESO's version and the app starts flapping
      # OutOfSync, check `kubectl explain externalsecret.spec.dataFrom.extract`
      # for what the new defaults are.
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
{{- end }}
