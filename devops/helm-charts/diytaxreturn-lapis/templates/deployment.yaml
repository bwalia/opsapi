apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ .Release.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          lifecycle:
            postStart:
              exec:
                command: ["/bin/sh", "-c", "stat -c %a /tmp && ls -la /tmp && cp /tmp/configmap/bootstrap-nginx.sh /usr/local/bin/bootstrap-nginx.sh && chmod +x /usr/local/bin/bootstrap-nginx.sh && /bin/sh /usr/local/bin/bootstrap-nginx.sh"]
          volumeMounts:
            - name: {{ .Release.Name }}-cm-{{ .Release.Namespace }}-vol
              mountPath: /tmp/configmap
            - name: {{ .Release.Name }}-vol-{{ .Release.Namespace }}
              mountPath: /tmp/secrets
          ports:
            - containerPort: {{ .Values.containerPort | default 80 }}
          startupProbe:
            httpGet:
              path: /live
              port: {{ .Values.containerPort | default 80 }}
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /live
              port: {{ .Values.containerPort | default 80 }}
            timeoutSeconds: 3
            failureThreshold: 3
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.containerPort | default 80 }}
            timeoutSeconds: 10
            periodSeconds: 15
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-secrets
          env:
            - name: LAPIS_ENVIRONMENT
              value: "production"
            # Deployment-environment label used by helper/mail.lua to
            # decide whether to inject the non-prod debug banner +
            # [ENV] subject prefix. We can't reuse LAPIS_ENVIRONMENT
            # here because it's hardcoded "production" above so the
            # secret-templated config.lua's single `config("production")`
            # block is selected ‚Äî without this split, the banner would
            # never fire on dev/test/int/acc.
            #
            # Values: dev / test / int / acc / prod ‚Äî matches the suffix
            # of values-*.yaml. helper/mail.lua treats both "prod" and
            # "production" as prod (is_production_env), so prod
            # deployments get no banner.
            - name: OPSAPI_DEPLOY_ENV
              value: {{ .Values.env | quote }}
            # The k3s Zalando Postgres enforces TLS (pg_hba: `hostnossl all
            # all all reject`); config.lua reads POSTGRES_SSL to turn on
            # pgmoon SSL (ssl_verify=false for the self-signed cert). This
            # chart only ever deploys to k8s/Zalando environments, so SSL is
            # always required here. Without it every DB call is rejected with
            # "no encryption" and the whole API 500s.
            - name: POSTGRES_SSL
              value: {{ .Values.postgresSsl | default "true" | quote }}
            # PCRE pattern (matched via ngx.re.match) of recipients
            # whose SMTP delivery must be silently skipped. Used by
            # helper/mail.lua + helper/otp.lua; gated internally on
            # is_production_env, so this is a no-op in prod even when
            # set ‚Äî safe to default for every env. Covers three known
            # non-deliverable sinks that otherwise generate Mail
            # Delivery Subsystem bounces back to SMTP_FROM_EMAIL:
            #   - legacy `diytaxreturnmail+e2e-‚Ä¶@gmail.com` E2E pattern
            #   - `*@e2e.invalid` E2E sink (RFC 6761 reserved TLD)
            #   - `*@admin.com` test-admin user (MX times out to 127.0.0.1)
            - name: OTP_SUPPRESS_FOR_EMAIL_REGEX
              value: {{ .Values.otpSuppressForEmailRegex | default "^diytaxreturnmail\\+e2e-.*@gmail\\.com$|@e2e\\.invalid$|@admin\\.com$" | quote }}
            - name: PROJECT_CODE
              value: {{ .Values.projectCode | default "all" | quote }}
            {{- if and .Values.setup .Values.setup.adminEmail }}
            - name: ADMIN_EMAIL
              value: {{ .Values.setup.adminEmail | quote }}
            {{- end }}
            {{- if and .Values.setup .Values.setup.adminPassword }}
            - name: ADMIN_PASSWORD
              value: {{ .Values.setup.adminPassword | quote }}
            {{- end }}
            {{- if and .Values.setup .Values.setup.namespaceSlug }}
            - name: NAMESPACE_SLUG
              value: {{ .Values.setup.namespaceSlug | quote }}
            {{- end }}
            # ‚îÄ‚îÄ Password reset email links + allow-list bootstrap ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
            # These two env vars feed migration 489's auto-bootstrap of
            # ``namespaces.allowed_redirect_origins`` AND the legacy
            # env-var fallback in /auth/forgot-password (defence in
            # depth for any namespace whose column is empty at runtime).
            #
            # ``frontendUrl``  = canonical primary frontend for this tenant.
            # ``passwordResetAllowedOrigins`` = optional comma-separated
            # extras for multi-frontend tenants (staging + prod, or
            # per-region domains).
            #
            # See README.md ‚Üí Password Reset Flow for the full lookup
            # priority chain.
            {{- if .Values.frontendUrl }}
            - name: FRONTEND_URL
              value: {{ .Values.frontendUrl | quote }}
            {{- end }}
            {{- if .Values.passwordResetAllowedOrigins }}
            - name: PASSWORD_RESET_ALLOWED_ORIGINS
              value: {{ .Values.passwordResetAllowedOrigins | quote }}
            {{- end }}
      volumes:
        - name: {{ .Release.Name }}-cm-{{ .Release.Namespace }}-vol
          configMap:
            name: {{ .Release.Name }}-cm-{{ .Release.Namespace }}
        - name: {{ .Release.Name }}-vol-{{ .Release.Namespace }}
          secret:
            secretName: "{{ .Release.Name }}-secrets"
            items:
            - key: LAPIS_CONFIG_LUA_FILE
              path: config.lua
