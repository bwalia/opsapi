env: acc
app: diytaxreturn-lapis
# Scope migrations + namespace setup to the tax app only. With "all",
# this deployment would run (and own) migrations for every platform
# project — ecommerce, hospital, crm, kanban, … — none of which the
# DIY Tax Return app uses. A CRM migration drift took acc opsapi down
# for 22h on 2026-05-14; "tax_copilot" makes that class of failure
# impossible since non-tax migration modules are never loaded.
projectCode: tax_copilot

# ─── Password reset email link target ─────────────────────────────────
# Canonical frontend origin for this environment. Migration 489 uses
# this to bootstrap ``namespaces.allowed_redirect_origins`` on first
# run; runtime path also falls back to it if any namespace's column
# is empty. See README.md → Password Reset Flow.
frontendUrl: "https://acc.diytaxreturn.co.uk"
# Optional: comma-separated extra origins (e.g. an alternate domain
# or migration period when both old + new domains should be valid).
# passwordResetAllowedOrigins: "https://acc-alt.diytaxreturn.co.uk"

image:
  repository: bwalia/opsapi
  tag: latest
  pullPolicy: Always

replicaCount: 1

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: wslproxy
  annotations: {}
  hosts: []
  tls: []

database:
  host: "10.96.69.50"

externalSecret:
  enabled: true

setup:
  adminEmail: ""
  adminPassword: ""
  namespaceSlug: ""

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
