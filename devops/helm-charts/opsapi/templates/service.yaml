{{- if .Values.svcAccessPort }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-nodeport
spec:
  selector:
    app: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      nodePort: {{ .Values.svcAccessPort }}
  type: NodePort
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.name | default (printf "%s-svc" .Release.Name) }}
spec:
  selector:
    app: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
  type: {{ .Values.service.type }}
