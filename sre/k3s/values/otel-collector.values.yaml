# OpenTelemetry Collector for k3s prod — the single ingestion funnel.
#   helm install otel-collector open-telemetry/opentelemetry-collector \
#     -n monitoring -f otel-collector.values.yaml
# Apps send OTLP here; it fans out traces→Tempo, metrics→Prometheus scrape,
# logs→Loki. Mirrors ../../otel-collector/otel-collector-config.yml.
mode: deployment
replicaCount: 1

image:
  repository: otel/opentelemetry-collector-contrib

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  prometheus:
    enabled: true
    containerPort: 8889
    servicePort: 8889
    protocol: TCP

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
  processors:
    batch:
      timeout: 5s
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25
  exporters:
    otlp/tempo:
      endpoint: tempo.monitoring.svc:4317
      tls:
        insecure: true
    prometheus:
      endpoint: 0.0.0.0:8889
      enable_open_metrics: true
    otlphttp/loki:
      endpoint: http://loki-gateway.monitoring.svc:80/otlp
  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [otlp/tempo]
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [prometheus]
      logs:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [otlphttp/loki]

# Let Prometheus scrape the collector's :8889 exporter.
podMonitor:
  enabled: false
serviceMonitor:
  enabled: true
  extraLabels:
    release: monitoring
  metricsEndpoints:
    - port: prometheus
