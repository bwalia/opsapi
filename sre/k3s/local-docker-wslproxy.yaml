  namespace: opsapi-sre-demo
subsets:
  - addresses:
      - ip: 192.168.1.193
    ports:
      - name: http
        port: 9091
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sre-prometheus
  namespace: opsapi-sre-demo
  annotations:
    cert-manager.io/cluster-issuer: main-issuer
spec:
